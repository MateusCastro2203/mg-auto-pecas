<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 372 104" role="img" aria-label="MG Auto Peças">
  <title>MG Auto Peças</title>
  <!-- Emblema: velocímetro + monograma MG -->
  <g transform="translate(2 2)">
    <circle cx="50" cy="50" r="46" fill="#FFFFFF" stroke="#0F6E7C" stroke-width="3"/>
    <!-- trilho do velocímetro -->
    <path d="M27.5 55 A26 26 0 1 1 72.5 55" fill="none" stroke="#E5ECEC" stroke-width="6" stroke-linecap="round"/>
    <!-- progresso (crescimento) -->
    <path d="M27.5 55 A26 26 0 0 1 69.9 25.3" fill="none" stroke="#0F6E7C" stroke-width="6" stroke-linecap="round"/>
    <!-- agulha apontando pra cima = crescer -->
    <line x1="50" y1="42" x2="66.9" y2="27.9" stroke="#D8891A" stroke-width="3.4" stroke-linecap="round"/>
    <circle cx="50" cy="42" r="3.6" fill="#16242A"/>
    <text x="50" y="82" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="30" font-weight="800" letter-spacing="-1.5" fill="#16242A">MG</text>
  </g>
  <!-- Wordmark -->
  <g transform="translate(116 0)">
    <text x="0" y="50" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="30" font-weight="800" letter-spacing="-0.5" fill="#16242A">MG Auto Peças</text>
    <text x="2" y="72" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="2.4" fill="#57686F">PEÇAS &amp; ACESSÓRIOS · MERCADO LIVRE</text>
  </g>
</svg>
